databases:
  - name: crm-postgres
    databaseName: crm_db
    user: crm_user
    plan: free

services:
  - type: web
    name: crm-app
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crm-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
