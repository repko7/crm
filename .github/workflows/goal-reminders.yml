name: Goal Reminders

on:
  schedule:
    - cron: '0 4 * * *'   # 07:00 Київ (UTC+3)
    - cron: '0 18 * * *'  # 21:00 Київ (UTC+3)
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Визначити тип нагадування
        id: meta
        run: |
          HOUR=$(date -u +%H)
          DATE=$(date -u +%Y-%m-%d)
          if [ "$HOUR" = "04" ]; then
            TYPE="morning"
          else
            TYPE="evening"
          fi
          # Generate HMAC token: sha256(JWT_SECRET, "uid:date:type")
          UID="${{ secrets.CHECKIN_USER_ID }}"
          SECRET="${{ secrets.JWT_SECRET }}"
          TOKEN=$(echo -n "${UID}:${DATE}:${TYPE}" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $2}')
          FRONTEND="${{ secrets.FRONTEND_URL }}"
          URL="${FRONTEND}/checkin?token=${TOKEN}&date=${DATE}&type=${TYPE}&uid=${UID}"
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Ранкове нагадування
        if: steps.meta.outputs.type == 'morning'
        run: |
          URL="${{ steps.meta.outputs.url }}"
          DATE="${{ steps.meta.outputs.date }}"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"onboarding@resend.dev\",
              \"to\": [\"repkooleg@gmail.com\"],
              \"subject\": \"🌅 Доброго ранку, Олег! Час ставити цілі на сьогодні\",
              \"html\": \"<div style='font-family:sans-serif;max-width:560px;margin:0 auto;background:#f8fafc;padding:32px;border-radius:12px'><h1 style='color:#1e40af;margin-bottom:8px'>🌅 Ранкове планування</h1><p style='font-size:16px;color:#334155'>Привіт, <strong>Олег</strong>!</p><p style='color:#475569'>Починається новий день, повний можливостей. Витрати 5 хвилин на планування.</p><div style='background:#dbeafe;border-left:4px solid #2563eb;padding:16px;border-radius:6px;margin:20px 0'><p style='margin:0;font-weight:600;color:#1e40af'>Запитай себе:</p><ul style='color:#1e3a8a;margin:8px 0'><li>Яка одна найважливіша ціль на сьогодні?</li><li>Як я зрозумію, що досяг її?</li><li>Які конкретні кроки треба зробити?</li></ul></div><a href='${URL}' style='display:inline-block;background:#2563eb;color:white;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:700;font-size:16px;margin-top:8px'>✏️ Записати ранкові цілі →</a><p style='color:#94a3b8;font-size:12px;margin-top:24px'>CRM Pro · Goal Planning · ${DATE}</p></div>\"
            }"

      - name: Вечірнє нагадування
        if: steps.meta.outputs.type == 'evening'
        run: |
          URL="${{ steps.meta.outputs.url }}"
          DATE="${{ steps.meta.outputs.date }}"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"onboarding@resend.dev\",
              \"to\": [\"repkooleg@gmail.com\"],
              \"subject\": \"🌙 Добрий вечір, Олег! Час підбити підсумки дня\",
              \"html\": \"<div style='font-family:sans-serif;max-width:560px;margin:0 auto;background:#f8fafc;padding:32px;border-radius:12px'><h1 style='color:#7c3aed;margin-bottom:8px'>🌙 Вечірній check-in</h1><p style='font-size:16px;color:#334155'>Привіт, <strong>Олег</strong>!</p><p style='color:#475569'>День добігає кінця. Час переглянути досягнення та підготуватися до завтра.</p><div style='background:#ede9fe;border-left:4px solid #7c3aed;padding:16px;border-radius:6px;margin:20px 0'><p style='margin:0;font-weight:600;color:#6d28d9'>Запитай себе:</p><ul style='color:#4c1d95;margin:8px 0'><li>Які цілі сьогодні вдалось виконати?</li><li>Що завадило і як уникнути цього завтра?</li><li>Які три пріоритети на завтра?</li></ul></div><a href='${URL}' style='display:inline-block;background:#7c3aed;color:white;padding:14px 32px;border-radius:10px;text-decoration:none;font-weight:700;font-size:16px;margin-top:8px'>✏️ Заповнити вечірній check-in →</a><p style='color:#94a3b8;font-size:12px;margin-top:24px'>CRM Pro · Goal Planning · ${DATE}</p></div>\"
            }"
