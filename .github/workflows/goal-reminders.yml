name: Goal Reminders

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram reminder
        run: |
          HOUR=$(date -u +%H)
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          if [ "$HOUR" = "04" ]; then
            MSG="Dobroho ranku, Oleh! Chas stavyty tsili na sohodni. Napyshi svoi tsili priamo tut."
          else
            MSG="Dobryy vechir, Oleh! Chas pidbyty pidsumky. Napyshi shcho vdalosia zrobyty sohodni."
          fi
          curl -s -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${CHAT}\",\"text\":\"${MSG}\"}"
